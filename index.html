<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件飛入動畫</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      position: relative;
      text-align: center;
    }

    /* 資料夾容器 */
    .folder-container {
      position: relative;
      width: 160px;
      height: 140px;
      margin-bottom: 20px;
    }

    /* 文件樣式 */
    .file-item {
      position: absolute;
      left: 50%;
      bottom: -20px;
      width: 100px;
      height: 130px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transform: translateX(-50%) scale(1);
      opacity: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      padding: 10px;
      box-sizing: border-box;
    }

    .file-line {
      height: 6px;
      background: #f0f0f0;
      margin-bottom: 8px;
      border-radius: 2px;
    }

    /* 執行動畫的類別 */
    .fly-in {
      animation: flyAnimation 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes flyAnimation {
      0% {
        bottom: -100px;
        transform: translateX(-50%) scale(0.5);
        opacity: 0;
      }
      30% {
        bottom: 20px;
        transform: translateX(-50%) scale(1.1);
        opacity: 1;
      }
      100% {
        bottom: 50px;
        transform: translateX(-50%) scale(0.1) rotate(5deg);
        opacity: 0;
      }
    }

    /* 資料夾主體 */
    .folder-main {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    .folder-front {
      position: absolute;
      bottom: 0;
      z-index: 10; /* 確保前蓋在文件上方 */
      width: 100%;
    }

    .folder-back {
      position: absolute;
      bottom: 0;
      z-index: 2; /* 後蓋在文件下方 */
      width: 100%;
    }

    .info-text {
      color: #333;
    }

    .count {
      color: #888;
      font-size: 14px;
      margin-top: 5px;
    }

    button {
      margin-top: 30px;
      padding: 10px 25px;
      border: none;
      background: #007AFF;
      color: white;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="folder-container">
      <div id="targetFile" class="file-item">
        <div class="file-line" style="width: 80%"></div>
        <div class="file-line"></div>
        <div class="file-line" style="width: 60%"></div>
        <div class="file-line"></div>
      </div>

      <div class="folder-main">
        <div class="folder-back">
          <svg viewBox="0 0 64 64" width="160">
            <defs>
              <linearGradient id="folderGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#FFEC8B"/>
                <stop offset="1" stop-color="#E6A800"/>
              </linearGradient>
            </defs>
            <path d="M6 20c0-1.1.9-2 2-2h12l3-3h22c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V20z" fill="url(#folderGrad)"/>
          </svg>
        </div>
        <div class="folder-front">
          <svg viewBox="0 0 64 64" width="160">
            <path d="M6 24c0-1.1.9-2 2-2h48c1.1 0 2 .9 2 2v20c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V24z" fill="#FFD23F" opacity="0.9" />
            <circle cx="32" cy="34" r="10" fill="none" stroke="#B37B00" stroke-width="2"/>
            <path d="M32 29v10M28 35l4 4 4-4" fill="none" stroke="#B37B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="info-text">下載項目</div>
    <div class="count"><span id="fileCount">11</span> 個項目</div>

    <button onclick="startDownload()">模擬下載</button>
  </div>

  <script>
    let count = 11;
    function startDownload() {
      const file = document.getElementById('targetFile');
      const countDisplay = document.getElementById('fileCount');
      
      // 重啟動畫
      file.classList.remove('fly-in');
      void file.offsetWidth; 
      file.classList.add('fly-in');

      // 動畫中途更新數字
      setTimeout(() => {
        count++;
        countDisplay.innerText = count;
      }, 500);
    }
  </script>

</body>
</html>
