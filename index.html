<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件飛入資料夾動畫</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f7f3e8;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 資料夾容器 */
    .folder-wrapper {
      position: relative;
      width: 128px;
      height: 128px;
      z-index: 2;
    }

    /* 文件樣式 */
    .file {
      position: absolute;
      width: 50px;
      height: 65px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      padding: 5px;
      box-sizing: border-box;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      top: -150px; /* 起始位置在上方 */
    }

    .file-line {
      height: 4px;
      background: #eee;
      margin-bottom: 5px;
      width: 100%;
    }

    /* 動畫效果 */
    @keyframes fileFlyIn {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        transform: translate(0, 160px) scale(0.6) rotate(10deg);
        opacity: 1;
      }
      100% {
        transform: translate(0, 180px) scale(0.2) rotate(20deg);
        opacity: 0;
      }
    }

    .animate-file {
      animation: fileFlyIn 1.2s cubic-bezier(0.45, 0, 0.55, 1) forwards;
    }

    button {
      margin-top: 50px;
      padding: 10px 20px;
      cursor: pointer;
      background: #ffd23f;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="file" class="file">
      <div class="file-line" style="width: 70%"></div>
      <div class="file-line"></div>
      <div class="file-line"></div>
      <div class="file-line" style="width: 40%"></div>
    </div>

    <div class="folder-wrapper">
      <svg viewBox="0 0 64 64" width="100%" height="100%">
        <defs>
          <linearGradient id="yellowGlass" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#FFF9D7" stop-opacity="0.98"/>
            <stop offset="0.3" stop-color="#FFEC8B" stop-opacity="0.95"/>
            <stop offset="0.7" stop-color="#FFD23F" stop-opacity="0.88"/>
            <stop offset="1" stop-color="#E6A800" stop-opacity="0.8"/>
          </linearGradient>
          <linearGradient id="amberDepth" x1="0" x2="1" y1="0.5" y2="1">
            <stop offset="0" stop-color="#FFB84D" stop-opacity="0.25"/>
            <stop offset="1" stop-color="#D98C00" stop-opacity="0.4"/>
          </linearGradient>
          <linearGradient id="edgeGlow" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#FFE57F" stop-opacity="0.6"/>
            <stop offset="0.5" stop-color="#FFD23F" stop-opacity="0.2"/>
            <stop offset="1" stop-color="#FFB300" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="tabGlass" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#FFD966" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#FFB52E" stop-opacity="0.8"/>
          </linearGradient>
          <filter id="innerShadow" x="-10%" y="-10%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
            <feOffset dx="0" dy="1" result="offsetBlur"/>
            <feFlood flood-color="#B37B00" flood-opacity="0.35" result="color"/>
            <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
            <feComposite in="shadow" in2="SourceGraphic" operator="over"/>
          </filter>
        </defs>
        <path d="M6 20c0-1.1.9-2 2-2h12l3-3h22c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V20z" fill="url(#yellowGlass)" filter="url(#innerShadow)"/>
        <path d="M6 20c0-1.1.9-2 2-2h12l3-3h22c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V20z" fill="url(#amberDepth)" opacity="0.85"/>
        <path d="M11 17h10l3-3h18c1.1 0 2 .9 2 2v2H11v-1z" fill="url(#tabGlass)"/>
        <path d="M6 20c0-1.1.9-2 2-2h12l3-3h22c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V20z" fill="none" stroke="url(#edgeGlow)" stroke-width="0.8" opacity="0.7"/>
      </svg>
    </div>
  </div>

  <button onclick="playAnimation()">開始存檔</button>

  <script>
    function playAnimation() {
      const file = document.getElementById('file');
      // 重置動畫
      file.classList.remove('animate-file');
      void file.offsetWidth; // 強制重繪
      file.classList.add('animate-file');
    }
  </script>

</body>
</html>
